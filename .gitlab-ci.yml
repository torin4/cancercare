stages:
  - build
  - pages

build:
  stage: build
  image: node:18
  cache:
    paths:
      - node_modules/
  variables:
    NODE_OPTIONS: "--max-old-space-size=4096"
  before_script:
    - npm ci --prefer-offline --no-audit
  script:
    - npm run build
  artifacts:
    paths:
      - build/
    expire_in: 1 week
  only:
    - main
    - master
  # Only run on main/master to save CI minutes
  # This job will NOT trigger Vercel integration
  # Pipeline will succeed even if external stages fail
  # Allow failure to prevent pipeline failure when quota is exhausted
  allow_failure: true
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

pages:
  stage: pages
  image: alpine:latest
  script:
    - apk add --no-cache bash
    - echo "Starting Pages deployment..."
    - mkdir -p public
    - echo "Copying HTML files from docs/ to public/"
    - cp docs/*.html public/
    - echo "Files in public/:"
    - ls -la public/
    - |
      if [ ! -f "public/index.html" ]; then
        echo "Creating index.html"
        cat > public/index.html << 'EOF'
        <!DOCTYPE html>
        <html><head><meta http-equiv="refresh" content="0; url=privacy-policy.html"></head></html>
        EOF
      fi
    - echo "✅ Pages deployment ready"
  artifacts:
    paths:
      - public
  rules:
    # This ensures that only pushes to the default branch will trigger a pages deploy
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
