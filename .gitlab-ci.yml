stages:
  - pages

# Build is handled by Vercel externally, so we skip it here to avoid quota issues
# Only Pages deployment runs in GitLab CI

pages:
  stage: pages
  image: alpine:latest
  script:
    - apk add --no-cache bash
    - echo "Starting Pages deployment..."
    - mkdir -p public
    - echo "Copying HTML files from docs/ to public/"
    - cp docs/*.html public/
    - echo "Files in public/:"
    - ls -la public/
    - |
      if [ ! -f "public/index.html" ]; then
        echo "Creating index.html"
        cat > public/index.html << 'EOF'
        <!DOCTYPE html>
        <html><head><meta http-equiv="refresh" content="0; url=privacy-policy.html"></head></html>
        EOF
      fi
    - echo "✅ Pages deployment ready"
  artifacts:
    paths:
      - public
  rules:
    # This ensures that only pushes to the default branch will trigger a pages deploy
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
